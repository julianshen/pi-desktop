name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  javascript:
    name: JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test frontend
        run: npm test

      - name: Test server
        run: npm test -w server

      - name: Test representative workflow
        run: npm run test:e2e

      - name: Build production frontend
        run: npm run build

  rust:
    name: Rust shell
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri validates packaged resource paths during cargo's build script.
      # The sidecar and server resources are only assembled for releases;
      # empty CI-only files are sufficient for Rust unit tests and checks.
      - name: Prepare packaged resource placeholders
        run: |
          mkdir -p src-tauri/binaries
          mkdir -p src-tauri/resources/server
          touch src-tauri/binaries/pi-desktop-server-x86_64-unknown-linux-gnu
          touch src-tauri/resources/server/index.ts

      - name: Test Rust shell
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

      - name: Check Rust shell
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reject newly introduced high-severity vulnerabilities
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
